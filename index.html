<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск почтового индекса</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #333; text-align: center; }
        .error { color: #dc3545 ! deprivation; }
    </style>
</head>
<body>

<div class="card">
    <h2>Логистический индекс</h2>
    <input type="text" id="country" placeholder="Страна (например, Казахстан)">
    <input type="text" id="city" placeholder="Город (например, Алматы)">
    <button onclick="getZip()">Найти индекс</button>
    <div id="result"></div>
</div>

<script>
async function getZip() {
    const city = document.getElementById('city').value;
    const country = document.getElementById('country').value;
    const resultDiv = document.getElementById('result');
    
    if(!city || !country) {
        resultDiv.innerHTML = "Пожалуйста, заполните все поля";
        return;
    }

    resultDiv.innerHTML = "Поиск...";

    try {
        // Запрос к API Nominatim (OpenStreetMap)
        const response = await fetch(`https://nominatim.openstreetmap.org{encodeURIComponent(city)}&country=${encodeURIComponent(country)}&format=json&addressdetails=1`);
        const data = await response.json();

        if (data && data.length > 0) {
            // Ищем индекс в деталях адреса
            const postcode = data[0].address.postcode;
            if (postcode) {
                resultDiv.innerHTML = `Индекс: <span style="color: #28a745;">${postcode}</span>`;
            } else {
                resultDiv.innerHTML = "Индекс для этого города не найден в базе";
            }
        } else {
            resultDiv.innerHTML = "Город или страна не найдены";
        }
    } catch (error) {
        resultDiv.innerHTML = "Ошибка сети или API";
        console.error(error);
    }
}
</script>

</body>
</html>
